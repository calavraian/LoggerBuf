syntax = "proto3";

/**
* This is a demo User Event provided as an example.
* You can create your own User Events by creating 
* new .proto files in this directory.
*
* This file can be removed or edited as you wish.
*/
message DemoUserEvent {
    enum OperationType {
        OPERATION_UNSPECIFIED = 0;
        OPERATION_DATA_READ = 1;
        OPERATION_DATA_WRITE = 2;
        OPERATION_DATA_UPDATE = 3;
        OPERATION_DATA_DELETE = 4;
    }

    string name = 1;
    string description = 2;
    int64 counter = 3;
    OperationType operation_type = 4;
    int32 new_metric = 5 [deprecated = true];
}
