syntax = "proto3";

package enum_control;

/**
* General status, used to define a current status of an event
* add specific statuses for the different types of events here
* define and reserve a range of values for each event.
*/    
enum EventStatus {
    // Generic statuses for any event tyoe
    // Range: 0-50
    // Next value: 6
    STATUS_UNSPECIFIED = 0;
    STATUS_PENDING = 1;
    STATUS_ACTIVE = 2;
    STATUS_COMPLETED = 3;
    STATUS_FAILED = 4;
    STATUS_ABORTED = 5;

    // Specific statuses for the demo user event
    // Range: 51-100
    // Next value: 54
    DEMO_EVENT_STATUS_STARTED = 51;
    DEMO_EVENT_STATUS_COMPLETED = 52;
    DEMO_EVENT_STATUS_FAILED = 53;
}

/**
* All events to be logged need to be registered here first
* define and reserve a range of values for each event.
*/
enum EventType {
    // Generic event types, can be used for general logging
    // in case a specific event type is not defined.
    // Range: 0-100
    // Next value: 6
    EVENT_UNSPECIFIED = 0;
    EVENT_GENERIC = 1;
    EVENT_MAIN = 2;
    EVENT_DATA_BASE_PROCESSING = 3;
    EVENT_API_REQUEST = 4;
    EVENT_API_RESPONSE = 5;

    // Specific event types for the demo user event
    // Range: 101-200
    // Next value: 106
    DEMO_EVENT_API_INVOKED = 101;
    DEMO_EVENT_API_RESPONSE = 102;
    DEMO_EVENT_DATA_PROCESSED = 104;
    DEMO_EVENT_DATA_STORED = 105;
}

/**
* All counters to be logged need to be registered here first
* define and reserve a range of values for each counter.
*/
enum CounterType {
    // Generic counter types
    // Range: 0-100
    // Next value: 2
    COUNTER_UNSPECIFIED = 0;
    COUNTER_GENERIC = 1;
}
